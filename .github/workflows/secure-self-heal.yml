name: Secure Self-Heal (QKD-gated PR, safety ladder)

on:
  workflow_dispatch:
    inputs:
      enable_pr:
        description: "If true, open a PR and publish evidence pages."
        required: true
        default: "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  secure-self-heal:
    runs-on: ubuntu-latest
    outputs:
      no_patch: ${{ steps.noop.outputs.no_patch }}
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Run QKD MITM proof (artifact)
        run: |
          python -m experiments.qkd_mitm.run

      - name: Clean workspace before evidence run
        run: |
          git reset --hard
          git clean -fdx
          mkdir -p reports/self_heal reports/patches

      - name: Run controlled locator break (records evidence)
        env:
          BREAK_LOCATOR: "true"
          SELF_HEAL_DIR: "reports/self_heal"
        run: |
          pytest -q tests/ui/test_login.py -k login --browser chromium

      - name: Summarize self-heal evidence + decide mode
        env:
          SELF_HEAL_DIR: "reports/self_heal"
        run: |
          python scripts/summarize_self_heal.py
          python scripts/decide_self_heal_action.py
          ls -la reports/self_heal || true
          cat reports/self_heal/self_heal_summary.md || true
          cat reports/self_heal/self_heal_decision.json || true

      - name: Extract MODE
        id: mode
        run: |
          MODE=$(python -c "import json;print(json.load(open('reports/self_heal/self_heal_decision.json'))['mode'])")
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "MODE=$MODE" >> $GITHUB_ENV

      - name: Generate patch (promote primary if confident; else expand fallbacks)
        env:
          SELF_HEAL_DIR: "reports/self_heal"
          SELF_HEAL_PROMOTE_MIN_COUNT: "2"
          SELF_HEAL_PROMOTE_MIN_POSTERIOR: "0.75"
          SELF_HEAL_PROMOTE_MIN_CI_LO: "0.55"
          SELF_HEAL_MIN_COUNT: "2"
        run: |
          set -e
          rm -f reports/patches/selected_self_heal.patch

          if [ "$MODE" = "PROMOTE_PRIMARY" ]; then
            python scripts/generate_self_heal_patch.py || true
            if [ -f reports/patches/locator_self_heal.patch ] && [ -s reports/patches/locator_self_heal.patch ]; then
              cp reports/patches/locator_self_heal.patch reports/patches/selected_self_heal.patch
            fi
          else
            python scripts/generate_fallback_expansion_patch.py || true
            if [ -f reports/patches/fallback_expansion.patch ] && [ -s reports/patches/fallback_expansion.patch ]; then
              cp reports/patches/fallback_expansion.patch reports/patches/selected_self_heal.patch
            fi
          fi

          if [ ! -f reports/patches/selected_self_heal.patch ] || [ ! -s reports/patches/selected_self_heal.patch ]; then
            echo "NO_PATCH=true" >> $GITHUB_ENV
            echo "No patch produced; skipping cross-browser + PR + learning curve."
            exit 0
          fi

          echo "NO_PATCH=false" >> $GITHUB_ENV
          sed -n '1,160p' reports/patches/selected_self_heal.patch || true

      - name: Expose NO_PATCH
        id: noop
        run: |
          echo "no_patch=${NO_PATCH:-false}" >> $GITHUB_OUTPUT

      - name: Validate patch applies cleanly
        if: ${{ env.NO_PATCH != 'true' }}
        run: |
          git apply --check reports/patches/selected_self_heal.patch

      - name: Python syntax guard (compile changed files)
        if: ${{ env.NO_PATCH != 'true' }}
        run: |
          git apply reports/patches/selected_self_heal.patch
          FILES=$(git diff --name-only | grep '\.py$' || true)
          if [ -n "$FILES" ]; then
            python -m py_compile $FILES
          fi
          git reset --hard

      - name: Upload patch artifact
        if: ${{ env.NO_PATCH != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: selected-self-heal-patch
          path: reports/patches/selected_self_heal.patch

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-evidence
          path: |
            reports/self_heal/locator_events.jsonl
            reports/self_heal/self_heal_summary.json
            reports/self_heal/self_heal_summary.md
            reports/self_heal/self_heal_decision.json
            reports/qkd/qkd_mitm_artifact.json

  cross-browser-gate:
    needs: secure-self-heal
    if: ${{ needs.secure-self-heal.outputs.no_patch != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Download patch
        uses: actions/download-artifact@v4
        with:
          name: selected-self-heal-patch
          path: reports/patches

      - name: Apply patch
        run: |
          git apply reports/patches/selected_self_heal.patch

      - name: Run cross-browser tests (matrix)
        env:
          PW_ARTIFACT_DIR: artifacts/playwright
        run: |
          pytest -q tests/ui/test_login.py -k login --browser ${{ matrix.browser }}

      - name: Upload Playwright traces + videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}-artifacts
          path: |
            artifacts/playwright/**

  pr-and-pages:
    needs: [secure-self-heal, cross-browser-gate]
    if: ${{ github.event.inputs.enable_pr == 'true' && needs.secure-self-heal.outputs.no_patch != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download patch
        uses: actions/download-artifact@v4
        with:
          name: selected-self-heal-patch
          path: reports/patches

      - name: Download evidence
        uses: actions/download-artifact@v4
        with:
          name: self-heal-evidence
          path: reports

      - name: Decide PR type (draft if cross-browser failed)
        id: prtype
        run: |
          if [ "${{ needs.cross-browser-gate.result }}" = "success" ]; then
            echo "draft=false" >> $GITHUB_OUTPUT
          else
            echo "draft=true" >> $GITHUB_OUTPUT
          fi

      - name: Debug gh auth (who am I?)
        env:
          GH_TOKEN: ${{ secrets.TP_AI_PAT }}
        run: |
          gh auth status

      - name: Create branch, commit patch, and open PR (draft if needed)
        env:
          GH_TOKEN: ${{ secrets.TP_AI_PAT }}
          BASE_BRANCH: main
          MODE: ${{ needs.secure-self-heal.outputs.mode }}
          DRAFT_PR: ${{ steps.prtype.outputs.draft }}
        run: |
          set -e
          git config user.name "testpilot-ai-bot"
          git config user.email "testpilot-ai-bot@users.noreply.github.com"

          BRANCH="secure-self-heal/${MODE,,}/$(date +%s)"
          git checkout -b "$BRANCH"

          git apply reports/patches/selected_self_heal.patch
          git add -A
          git commit -m "Self-heal (${MODE}) update (QKD-gated)" || true
          git push -u origin "$BRANCH"

          SUMMARY_MD=""
          if [ -f reports/self_heal/self_heal_summary.md ]; then
            SUMMARY_MD="$(cat reports/self_heal/self_heal_summary.md)"
          fi

          python - << 'PY'
          from security.qkd.bb84 import BB84Params
          from security.qkd.channel import establish_qkd_session
          params = BB84Params()
          sess = establish_qkd_session(params, intercept_resend=False, ttl_seconds=300)
          print("QKD:", "accepted" if sess.accepted else "rejected", "qber=", round(sess.qber, 3), "fp=", sess.key_fingerprint)
          if not sess.accepted:
              raise SystemExit(2)
          PY

          BODY_FILE="$(mktemp)"
          {
            echo "This PR was created by TestPilot-AI's secure self-heal safety ladder."
            echo
            echo "- Mode: **${MODE}**"
            echo "- Draft PR: **${DRAFT_PR}**"
            echo "- Cross-browser gate: **${{ needs.cross-browser-gate.result }}**"
            echo
            echo "## Evidence summary (Bayesian)"
            echo
            echo "${SUMMARY_MD}"
            echo
            echo "Evidence: \`reports/self_heal/locator_events.jsonl\`"
            echo "Patch: \`reports/patches/selected_self_heal.patch\`"
          } > "$BODY_FILE"

          if [ "$DRAFT_PR" = "true" ]; then
            gh pr create --base "$BASE_BRANCH" --head "$BRANCH" --title "Self-heal (${MODE}) update (QKD-gated)" --body-file "$BODY_FILE" --draft
          else
            gh pr create --base "$BASE_BRANCH" --head "$BRANCH" --title "Self-heal (${MODE}) update (QKD-gated)" --body-file "$BODY_FILE"
          fi

      - name: Publish gh-pages evidence trend (optional)
        env:
          GH_TOKEN: ${{ secrets.TP_AI_PAT }}
        run: |
          python scripts/publish_evidence_pages.py
