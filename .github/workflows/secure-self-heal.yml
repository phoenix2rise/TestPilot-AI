name: Secure Self-Heal (QKD-gated PR, safety ladder)

on:
  workflow_dispatch:
    inputs:
      enable_pr:
        description: "If true, open a PR and publish evidence pages."
        required: true
        default: "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  secure-self-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Run QKD MITM proof (artifact)
        run: |
          python -m experiments.qkd_mitm.run

      - name: Clean workspace before evidence run
        run: |
          git reset --hard
          git clean -fdx
          mkdir -p reports/self_heal reports/patches

      - name: Run controlled locator break (records evidence)
        env:
          BREAK_LOCATOR: "true"
          SELF_HEAL_DIR: "reports/self_heal"
        run: |
          pytest -q tests/ui/test_login.py -k login

      - name: Summarize self-heal evidence + decide mode
        env:
          SELF_HEAL_DIR: "reports/self_heal"
        run: |
          python scripts/summarize_self_heal.py
          python scripts/decide_self_heal_action.py
          echo "---- reports/self_heal contents ----"
          ls -la reports/self_heal || true
          echo "---- self_heal_summary.md ----"
          cat reports/self_heal/self_heal_summary.md || true
          echo "---- self_heal_decision.json ----"
          cat reports/self_heal/self_heal_decision.json || true

      - name: Generate patch (promote primary if confident; else expand fallbacks)
        env:
          SELF_HEAL_DIR: "reports/self_heal"
          SELF_HEAL_PROMOTE_MIN_COUNT: "2"
          SELF_HEAL_PROMOTE_MIN_POSTERIOR: "0.75"
          SELF_HEAL_PROMOTE_MIN_CI_LO: "0.55"
          SELF_HEAL_MIN_COUNT: "2"
        run: |
          test -f reports/self_heal/self_heal_decision.json
          MODE=$(python -c "import json;print(json.load(open('reports/self_heal/self_heal_decision.json'))['mode'])")
          echo "MODE=$MODE" >> $GITHUB_ENV

          if [ "$MODE" = "PROMOTE_PRIMARY" ]; then
            echo "Promoting primary locators"
            python scripts/generate_self_heal_patch.py
            cp reports/patches/locator_self_heal.patch reports/patches/selected_self_heal.patch
          else
            echo "Expanding fallback lists"
            python scripts/generate_fallback_expansion_patch.py
            cp reports/patches/fallback_expansion.patch reports/patches/selected_self_heal.patch
          fi

          echo "---- selected_self_heal.patch (head) ----"
          sed -n '1,160p' reports/patches/selected_self_heal.patch || true

      - name: Validate patch applies cleanly
        run: |
          test -f reports/patches/selected_self_heal.patch
          git apply --check reports/patches/selected_self_heal.patch

      - name: Record learning-curve point (experiment artifact)
        env:
          SELF_HEAL_DIR: "reports/self_heal"
        run: |
          python -m experiments.self_heal_learning_curve.run

      # IMPORTANT:
      # - Use GH_TOKEN with a PAT to avoid "GitHub Actions is not permitted to create PRs"
      # - Create repo secret: TP_AI_PAT (classic PAT with repo scope)
      - name: Debug gh auth (who am I?)
        if: ${{ inputs.enable_pr == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.TP_AI_PAT }}
        run: |
          gh auth status || true

      - name: Open QKD-gated PR (optional)
        if: ${{ inputs.enable_pr == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.TP_AI_PAT }}
          BASE_BRANCH: main
        run: |
          python - << 'PY'
          import os, time, json
          from pathlib import Path
          from security.qkd.bb84 import BB84Params
          from security.qkd.channel import establish_qkd_session
          from mcp.gateway import default_gateway, SessionContext

          params = BB84Params()
          sess = establish_qkd_session(params, intercept_resend=False, ttl_seconds=300)
          print("QKD:", "accepted" if sess.accepted else "rejected", "qber=", round(sess.qber, 3), "fp=", sess.key_fingerprint)
          if not sess.accepted:
              raise SystemExit(2)

          summary_md = Path("reports/self_heal/self_heal_summary.md").read_text(encoding="utf-8") if Path("reports/self_heal/self_heal_summary.md").exists() else ""
          decision = json.loads(Path("reports/self_heal/self_heal_decision.json").read_text(encoding="utf-8")) if Path("reports/self_heal/self_heal_decision.json").exists() else {}
          mode = decision.get("mode", "UNKNOWN")
          patch_path = "reports/patches/selected_self_heal.patch"

          g = default_gateway()
          ctx = SessionContext(sess.created_ts, sess.expires_ts, sess.accepted, sess.key_fingerprint)

          branch = f"secure-self-heal/{mode.lower()}/{int(time.time())}"
          title = f"Self-heal ({mode}) update (QKD-gated)"
          body = "\n".join([
              "This PR was created by TestPilot-AI's secure self-heal safety ladder.",
              "",
              f"- Mode: **{mode}**",
              f"- QKD session fingerprint: `{sess.key_fingerprint}`",
              f"- QBER: `{sess.qber:.3f}`",
              "",
              "## Evidence summary (Bayesian)",
              summary_md,
              "",
              f"Patch applied: `{patch_path}`",
              "Evidence: `reports/self_heal/locator_events.jsonl`",
              ""
          ])

          res = g.invoke("commit_fix", {
              "patch_path": patch_path,
              "branch": branch,
              "title": title,
              "body": body,
              "base": os.getenv("BASE_BRANCH", "main"),
          }, session=ctx)

          print(res)
          if not res.get("ok"):
              raise SystemExit(3)
          PY

      - name: Publish gh-pages evidence trend (optional)
        if: ${{ inputs.enable_pr == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.TP_AI_PAT }}
        run: |
          python scripts/publish_evidence_pages.py

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-evidence
          path: |
            reports/self_heal/locator_events.jsonl
            reports/self_heal/self_heal_summary.json
            reports/self_heal/self_heal_summary.md
            reports/self_heal/self_heal_decision.json
            reports/self_heal/learning_curve_point.json
            reports/patches/selected_self_heal.patch
            reports/qkd/qkd_mitm_artifact.json
