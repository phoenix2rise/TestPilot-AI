locators:
  username:
    primary: "input[name='username']"
    fallbacks:
      - "input#username"
      - "[placeholder*='email' i]"
  password:
    primary: "input[type='password']"
    fallbacks:
      - "input#password"
  submit:
    primary: "button[type='submit']"
    fallbacks:
      - "button:has-text('Sign in')"
      - "button:has-text('Log in')"
