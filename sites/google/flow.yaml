base_url: "https://www.google.com"
flows:
  search:
    steps:
      - goto: "/search?q=${QUERY}"
      - check_recaptcha_if_present: {}
      - click_if_present:
          field: "cookie_reject"
      - click_if_present:
          field: "popup_close"
      - expect_visible:
          field: "search_results"
