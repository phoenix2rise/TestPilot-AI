base_url: "https://www.booking.com"
flows:
  search:
    steps:
      - goto: "/searchresults.html?ss=${DESTINATION}&checkin=${CHECKIN}&checkout=${CHECKOUT}&group_adults=2&no_rooms=1&group_children=0"
      - check_recaptcha_if_present: {}
      - click_if_present:
          field: "cookie_essential"
      - click_if_present:
          field: "popup_close"
      - expect_visible:
          field: "search_results"
